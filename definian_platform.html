<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Definian Data Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0D2C71;--green:#00AB63;--midnight:#02072D;
  --bg:#0a0e1a;--panel:#0f1525;--card:#0f1525;--raised:#151c2e;--elevated:#1a2238;
  --t1:#e8eaf0;--t2:#9aa3b8;--t3:#6b7280;--border:#2a3654;--border2:#3d4a6a;
  --red:#FF6B6B;--yellow:#FFD166;
}
body{font-family:'Roboto',sans-serif;background:var(--bg);color:var(--t1);font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#app{display:flex;flex:1;overflow:hidden}
#sidebar{width:210px;min-width:210px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{background:var(--blue);border-bottom:3px solid var(--green);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo{font-family:'Titillium Web',sans-serif;font-weight:700;font-size:22px;color:#fff;letter-spacing:-0.5px}
.logo span{color:var(--green)}
.topbar-sub{color:rgba(255,255,255,0.7);font-size:12px;border-left:1px solid rgba(255,255,255,0.2);padding-left:12px;margin-left:4px;font-family:'Titillium Web',sans-serif}
.topbar-user{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,0.8)}
.role-badge{background:var(--green);color:var(--midnight);padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;font-family:'Titillium Web',sans-serif}
.sb-section{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;padding:14px 14px 4px}
.nav-btn{display:block;width:100%;text-align:left;background:none;border:none;color:var(--t2);font-family:'Roboto',sans-serif;font-size:13px;padding:8px 14px;cursor:pointer}
.nav-btn:hover{background:var(--raised);color:var(--t1)}
.nav-btn.active{background:var(--raised);color:var(--green);border-left:3px solid var(--green);padding-left:11px}
.sb-divider{border:none;border-top:1px solid var(--border);margin:10px 14px}
.sb-user{padding:12px 14px;font-size:12px;color:var(--t2)}
.sb-user strong{display:block;color:var(--t1);font-weight:500;margin-bottom:2px}
.sb-user .sb-role{color:var(--green);font-size:11px;margin-top:2px}
.ui-toggle{display:flex;margin:12px 14px 4px;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.ui-btn{flex:1;padding:7px 4px;font-family:'Titillium Web',sans-serif;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;border:none;cursor:pointer;text-align:center}
.ui-btn.active{background:var(--green);color:var(--midnight)}
.ui-btn.inactive{background:var(--raised);color:var(--t2)}
.page{padding:20px 24px;flex:1}
.brand-bar{background:var(--blue);border-bottom:3px solid var(--green);padding:10px 18px;border-radius:6px;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.brand-title{font-family:'Titillium Web',sans-serif;font-weight:600;font-size:18px;color:#fff}
.dots{display:flex;gap:10px;margin-bottom:12px;opacity:0.3}
.dot{width:6px;height:6px;background:var(--green);border-radius:1px}
.section-title{font-family:'Titillium Web',sans-serif;font-size:10px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:1.5px;border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:12px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px 18px}
.kpi-label{font-family:'Titillium Web',sans-serif;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--t2);margin-bottom:6px}
.kpi-value{font-family:'Titillium Web',sans-serif;font-size:32px;font-weight:700;line-height:1}
.kpi-delta{font-size:11px;color:var(--t3);margin-top:4px}
.kpi-alert .kpi-value{color:var(--red)}
.kpi-warn .kpi-value{color:var(--yellow)}
.kpi-ok .kpi-value{color:var(--green)}
.two-col{display:grid;grid-template-columns:2fr 1fr;gap:16px}
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
.activity-item{padding:8px 10px;background:var(--raised);border-radius:4px;margin-bottom:6px;border-left:3px solid var(--green)}
.activity-meta{font-size:11px;color:var(--t2);margin-bottom:2px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;font-family:'Titillium Web',sans-serif;text-transform:uppercase}
.b-open{background:rgba(255,107,107,0.15);color:var(--red);border:1px solid rgba(255,107,107,0.4)}
.b-warn{background:rgba(255,209,102,0.15);color:var(--yellow);border:1px solid rgba(255,209,102,0.4)}
.b-ok{background:rgba(0,171,99,0.15);color:var(--green);border:1px solid rgba(0,171,99,0.4)}
.b-info{background:rgba(3,143,186,0.15);color:#038FBA;border:1px solid rgba(3,143,186,0.4)}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{background:var(--raised);color:var(--t1);font-family:'Titillium Web',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;padding:8px 10px;border-bottom:2px solid var(--border);text-align:left;font-weight:600}
.data-table td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--t1);vertical-align:middle}
.data-table tr:hover td{background:var(--raised)}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:auto;margin-bottom:16px}
.job-row{background:var(--raised);border-radius:8px;padding:12px 16px;margin-bottom:8px;border-left:4px solid var(--green);display:flex;align-items:center;gap:12px}
.job-row.running{border-left-color:#038FBA}
.job-row.failed{border-left-color:var(--red)}
.job-row.queued{border-left-color:var(--yellow)}
.job-name{font-family:'Titillium Web',sans-serif;font-weight:600;font-size:13px;color:var(--t1)}
.job-meta{font-size:11px;color:var(--t2);margin-top:2px}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:2px}
.progress-fill.run{background:#038FBA}
.progress-fill.fail{background:var(--red)}
.progress-fill.q{background:var(--yellow)}
.app-card{background:var(--raised);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s}
.app-card:hover{border-color:var(--green)}
.app-card-name{font-family:'Titillium Web',sans-serif;font-weight:600;font-size:13px;color:var(--t1)}
.app-card-desc{font-size:11px;color:var(--t2);margin-top:2px}
.btn{background:var(--green);color:var(--midnight);border:none;border-radius:6px;padding:7px 16px;font-family:'Titillium Web',sans-serif;font-weight:600;font-size:13px;cursor:pointer}
.btn:hover{background:#009955;color:#fff}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-outline{background:none;border:1px solid var(--border2);color:var(--t2);border-radius:6px;padding:7px 16px;font-family:'Titillium Web',sans-serif;font-weight:600;font-size:13px;cursor:pointer}
.btn-outline:hover{border-color:var(--green);color:var(--green)}
.select{background:var(--raised);color:var(--t1);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;font-family:'Roboto',sans-serif}
.input{background:var(--raised);color:var(--t1);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;font-family:'Roboto',sans-serif;width:100%}
.input:focus,.select:focus{outline:none;border-color:var(--green)}
.filters{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg)}
.login-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:40px 44px;width:420px;box-shadow:0 4px 24px rgba(0,0,0,0.3)}
.login-logo{font-family:'Titillium Web',sans-serif;font-weight:700;font-size:36px;color:#fff;margin-bottom:4px}
.login-logo span{color:var(--green)}
.login-sub{color:var(--t2);font-size:13px;margin-bottom:28px}
.form-label{font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;display:block;font-family:'Titillium Web',sans-serif;font-weight:600}
.form-group{margin-bottom:16px}
.error-msg{color:var(--red);font-size:12px;margin-top:8px}
.task-item{padding:8px 10px;background:var(--raised);border-radius:4px;margin-bottom:6px;border-left:3px solid var(--blue)}
.log-modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000}
.log-box{background:var(--panel);border:1px solid var(--border2);border-radius:10px;padding:24px;width:520px;max-height:400px;overflow-y:auto}
.log-line{font-family:'Roboto Mono',monospace;font-size:12px;color:var(--t2);padding:3px 0;border-bottom:1px solid var(--border)}
.log-line.err{color:var(--red)}
.log-line.ok{color:var(--green)}
</style>
</head>

<script>

function seededRand(seed){let s=seed;return()=>{s=(s*9301+49297)%233280;return s/233280}}
const sr=seededRand(42),sr2=seededRand(77),sr3=seededRand(99),sr4=seededRand(55);

  const sources=["Customer","Item","Vendor","GL Account"];
  const fields=["CostCenter","EmployeeID","GLCode","TaxID","Phone","ZipCode"];

})();

})();

const VAL_DATA=(()=>{

  return Array.from({length:40},(_,i)=>{const st=vstats[Math.floor(sr3()*vstats.length)];return{id:`REC-${3001+i}`,entity:entities[Math.floor(sr3()*entities.length)],fieldA:`Value_${Math.floor(sr3()*900+100)}`,fieldB:`Value_${Math.floor(sr3()*900+100)}`,status:st};});

const TREND_DATA=(()=>{
  const dates=Array.from({length:14},(_,i)=>{const d=new Date();d.setDate(d.getDate()-13+i);return d.toLocaleDateString("en",{month:"short",day:"numeric"})});

function badge(s){const m={Open:"b-open",Failed:"b-open","In Progress":"b-warn",Pending:"b-warn",Queued:"b-warn",Running:"b-info",Resolved:"b-ok",Completed:"b-ok",Approved:"b-ok",Validated:"b-ok","In Review":"b-info",Flagged:"b-open","Issue Found":"b-open",Changed:"b-warn","Pending Review":"b-warn"};return`<span class="badge ${m[s]||'b-info'}">${s}</span>`}

function sT(t){return`<div class="section-title">${t}</div>`}
function bBar(sub){return`<div class="brand-bar"><div class="brand-title">${sub}</div></div>`}

function lineChart(data,keys,colors){
  const W=600,H=200,pad={l:36,r:10,t:8,b:28},w=W-pad.l-pad.r,h=H-pad.t-pad.b;
  const maxV=Math.max(...data.flatMap(d=>keys.map(k=>d[k])))*1.1;
  const xs=w/(data.length-1),ys=v=>h-(v/maxV)*h;
  let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:${H}px"><g transform="translate(${pad.l},${pad.t})">`;
  [0,.5,1].forEach(p=>{const y=h*p;s+=`<line x1="0" y1="${y}" x2="${w}" y2="${y}" stroke="#2a3654" stroke-width="1"/>`;s+=`<text x="-4" y="${y+4}" fill="#6b7280" font-size="10" text-anchor="end">${Math.round(maxV*(1-p))}</text>`});
  data.forEach((d,i)=>{if(i%3===0||i===data.length-1)s+=`<text x="${i*xs}" y="${h+18}" fill="#6b7280" font-size="10" text-anchor="middle">${d.date}</text>`});
  keys.forEach((k,ki)=>{
    const pts=data.map((d,i)=>`${i*xs},${ys(d[k])}`).join(" ");
    if(ki===0){const area=`0,${h} `+data.map((d,i)=>`${i*xs},${ys(d[k])}`).join(" ")+` ${(data.length-1)*xs},${h}`;s+=`<polygon points="${area}" fill="${colors[ki]}" opacity="0.25"/>`}
    s+=`<polyline points="${pts}" fill="none" stroke="${colors[ki]}" stroke-width="2"/>`;
  });
  s+=`</g>`;
  keys.forEach((k,i)=>{s+=`<circle cx="${pad.l+i*110+8}" cy="${H-4}" r="4" fill="${colors[i]}"/>`;s+=`<text x="${pad.l+i*110+16}" y="${H}" fill="#9aa3b8" font-size="10">${k}</text>`});
  return s+`</svg>`;
}

function donutChart(vals,labels,colors,size=130){
  const total=vals.reduce((a,b)=>a+b,0);
  let start=-Math.PI/2,cx=size/2,cy=size/2,r=size*.38,inner=size*.24;
  let s=`<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg" style="width:${size}px;height:${size}px">`;
  vals.forEach((v,i)=>{
    const sw=(v/total)*2*Math.PI,end=start+sw;
    const x1=cx+r*Math.cos(start),y1=cy+r*Math.sin(start),x2=cx+r*Math.cos(end),y2=cy+r*Math.sin(end);
    const ix1=cx+inner*Math.cos(start),iy1=cy+inner*Math.sin(start),ix2=cx+inner*Math.cos(end),iy2=cy+inner*Math.sin(end);
    const lg=sw>Math.PI?1:0;
    s+=`<path d="M${ix1},${iy1} L${x1},${y1} A${r},${r} 0 ${lg},1 ${x2},${y2} L${ix2},${iy2} A${inner},${inner} 0 ${lg},0 ${ix1},${iy1}" fill="${colors[i]}"/>`;
    start=end;
  });
  s+=`<text x="${cx}" y="${cy+5}" fill="#e8eaf0" font-size="15" text-anchor="middle" font-weight="700" font-family="'Titillium Web',sans-serif">${total}</text></svg>`;
  return`<div style="display:flex;align-items:center;gap:14px">${s}<div style="font-size:11px">${vals.map((v,i)=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px"><div style="width:8px;height:8px;border-radius:2px;background:${colors[i]}"></div><span style="color:#9aa3b8">${labels[i]}</span><span style="color:#e8eaf0;margin-left:auto;padding-left:10px;font-weight:600">${v}</span></div>`).join('')}</div></div>`;
}

function renderApp(){
  const isPortal=state.ui==="Client Portal";
  const pages=isPortal
    ?["Home","Status","Data Mapping","Error Management","Data Validation","Compare & Reconcile","Deduplication",...(state.user.role==="Administrator"?["User Management"]:[]) ]

    else if(state.page==="Error Management") pageContent=renderErrors();

  return`<div class="page">
    ${bBar("Client Portal — Error Management")}${dots()}

function showLog(i){state.logModal=i;render()}
function closeLog(e){if(e.target.classList.contains('log-modal')){state.logModal=null;render()}}
function nav(p){state.page=p;render()}
function switchUI(ui){state.ui=ui;state.page=ui==="Client Portal"?"Home":"App Launcher";render()}
function doSignout(){state.auth=false;state.user=null;render()}
function doLogin(){const e=document.getElementById('li-email').value.trim(),p=document.getElementById('li-pw').value,u=USERS[e];if(u&&u.password===p){state.auth=true;state.user={...u,email:e};render()}else{document.getElementById('li-err').textContent='Invalid email or password.'}}
function filterErrors(s){state.errorFilter=s;render()}
function searchErrors(v){state.errSearch=v;render()}
function filterMaps(s){state.mapFilter=s;render()}
function render(){document.getElementById('root').innerHTML=state.auth?renderApp():renderLogin()}
render();
